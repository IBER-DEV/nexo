# Dockeriza solo el backend (Django + Postgres) para desarrollo local.
# El frontend sigue corriendo nativo (`npm run dev`) y desplegando a
# Cloudflare Workers sin cambios — ver el Dockerfile del backend para el
# porqué de esa decisión.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No host port published on purpose: only the backend container needs to
    # reach this (as db:5432 over the internal docker network), and this
    # machine already has other things bound to 5432/5433. To poke at the DB
    # from the host, use `docker compose exec db psql -U postgres -d nexo`.

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DB_HOST: db
      DB_NAME: nexo
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: docker-local-dev-secret-key-not-for-production-use
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
